# OpenOCD config: SK-AM62-LP + onboard XDS110 emulator
# Usage: openocd -f workspace/jtag/am625-xds110.cfg
#
# IMPORTANT — verified attach sequence (2026-05-17):
#   1. Boot Linux fully first (wait for login prompt on J17/tio)
#   2. Then start OpenOCD — targets will be examine-deferred until step 3
#   3. In telnet (port 4444): am625.cpu.a53.0 arp_examine
#   4. Then: am625.cpu.a53.0 arp_halt
#   5. Read PC: am625.cpu.a53.0 get_reg {pc}
#   6. Resume: resume
#
# Why boot first: TIFS (TI Foundational Security) must run during boot to
# assert DBGEN and open the debug ports. On HS-FS devices, debug is locked
# until TIFS enables it — examine will fail if attempted before Linux is up.
#
# Connections:
#   J13 (USB-C)      — power
#   J17 (micro-USB)  — UART console (needed to know when Linux is booted)
#   J18 (micro-USB)  — XDS110 JTAG
#
# Targets after init:
#   am625.cpu.sysctrl    — System Controller (cortex_m, AP 7)
#   am625.cpu.a53.0–3   — Cortex-A53 cluster (aarch64, AP 1) ← kernel debug
#   am625.cpu.main0_r5.0 — Cortex-R5F (DMSC / SBL)
#   am625.cpu.gp_mcu     — Cortex-M4F (MCU domain)
#
# GDB ports:
#   3333: sysctrl   3334: a53.0   3335: a53.1   3336: a53.2   3337: a53.3
#   3338: main0_r5.0   3339: gp_mcu
# Telnet console: telnet localhost 4444  (nc segfaults on macOS)

source [find interface/xds110.cfg]

transport select jtag

# 1 MHz for initial connection; bump to 4000+ once link is verified
adapter speed 1000

set SOC am625
source [find target/ti_k3.cfg]
